<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>DIV2BUILDS — The Division 2 Build Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1117;--bg2:#141920;--bg3:#1a2030;--panel:#171d28;--border:#222d40;--border2:#2d3f58;--orange:#f97316;--orange2:#fb923c;--odim:rgba(249,115,22,.15);--blue:#38bdf8;--bdim:rgba(56,189,248,.1);--green:#4ade80;--gdim:rgba(74,222,128,.1);--yellow:#fbbf24;--red:#f87171;--gold:#f59e0b;--purple:#a78bfa;--text:#e8eef8;--text2:#9aaec8;--text3:#637a96;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;line-height:1.5;overflow-x:hidden;-webkit-overflow-scrolling:touch}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.012) 3px,rgba(0,0,0,.012) 4px);pointer-events:none;z-index:999}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:68px;background:rgba(6,7,10,.97);border-bottom:1px solid rgba(255,255,255,.04);position:sticky;top:0;z-index:200;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);gap:32px}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(249,115,22,.25) 20%,rgba(249,115,22,.5) 50%,rgba(249,115,22,.25) 80%,transparent 100%);pointer-events:none}

.logo{display:flex;align-items:center;gap:12px;cursor:pointer;flex-shrink:0;user-select:none}
.logo-mark{width:34px;height:34px;position:relative;flex-shrink:0}
.logo-mark svg{width:34px;height:34px}
.logo-wordmark{display:flex;flex-direction:column;gap:2px}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:3px;color:#fff;text-transform:uppercase;line-height:1;display:flex;align-items:center}
.logo-text span{color:var(--orange)}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;line-height:1}

.nav-links{display:flex;gap:0;list-style:none;flex:1;justify-content:center}
.nav-links li{position:relative}
.nav-links a{display:flex;align-items:center;height:68px;padding:0 22px;color:var(--text3);text-decoration:none;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;transition:color .2s;cursor:pointer;position:relative;white-space:nowrap}
.nav-links a::before{content:'';position:absolute;bottom:0;left:20px;right:20px;height:2px;background:var(--orange);transform:scaleX(0);transform-origin:center;transition:transform .25s cubic-bezier(.4,0,.2,1);border-radius:2px 2px 0 0}
.nav-links a:hover{color:var(--text2)}
.nav-links a.active{color:#fff}
.nav-links a.active::before{transform:scaleX(1)}

.nav-actions{display:flex;gap:10px;align-items:center;flex-shrink:0}
.nav-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.btn{font-family:'Share Tech Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;padding:8px 18px;cursor:pointer;border:none;font-size:9px;transition:all .2s;border-radius:2px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-primary{background:var(--orange);color:#000;font-weight:700;letter-spacing:2px}
.btn-primary:hover{background:var(--orange2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(249,115,22,.3)}
.btn-save{background:transparent;color:var(--yellow);border:1px solid var(--yellow)}
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 68px)}
aside{background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto}
aside::-webkit-scrollbar{width:2px}
aside::-webkit-scrollbar-thumb{background:var(--border2);border-radius:1px}
aside::-webkit-scrollbar-track{background:transparent}
.sb{padding:0 14px 16px;border-bottom:1px solid var(--border);margin-bottom:14px}
.sb:last-child{border-bottom:none;margin-bottom:0}
.sb-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--orange);letter-spacing:3px;text-transform:uppercase;padding:8px 0;display:flex;align-items:center;gap:7px}
.sb-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.sw{position:relative;margin-bottom:10px}
.sw input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 30px 8px 11px;font-family:'Rajdhani',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.sw input:focus{border-color:var(--orange)}
.sw input::placeholder{color:var(--text3)}
.spec-list{display:flex;flex-direction:column;gap:3px}
.spec-btn{display:flex;align-items:center;gap:9px;padding:12px 10px;cursor:pointer;border:1px solid transparent;transition:all .2s;background:transparent;width:100%;text-align:left;color:var(--text2);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;border-radius:2px}
.spec-btn:hover{background:var(--odim);border-color:var(--border2);color:var(--text)}
.spec-btn.active{background:var(--odim);border-color:var(--orange);color:var(--orange)}
.sdot{width:7px;height:7px;transform:rotate(45deg);flex-shrink:0}
.scnt{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:2px;min-width:20px;text-align:center}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:7px 12px;border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .15s;background:transparent;text-transform:uppercase;border-radius:20px;-webkit-tap-highlight-color:transparent}
.tag:hover{border-color:var(--text3);color:var(--text2)}
.tag.active{border-color:var(--orange);color:var(--orange);background:var(--odim)}
.ev{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ev:last-child{border-bottom:none}
.evdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.evdot.live{background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2s infinite}
.evdot.soon{background:var(--yellow)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.evname{font-weight:600;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.evtime{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)}
.evbadge{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 5px;text-transform:uppercase;flex-shrink:0;border:1px solid}
.evbadge.live{color:var(--green);border-color:rgba(74,222,128,.3);background:var(--gdim)}
.evbadge.soon{color:var(--yellow);border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.07)}
main{padding:22px;background:var(--bg)}
.hero{background:linear-gradient(135deg,#111c2d 0%,#0a1019 60%,#0f0c18 100%);border:1px solid var(--border2);padding:26px 28px;margin-bottom:20px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(26,34,50,.35) 1px,transparent 1px),linear-gradient(90deg,rgba(26,34,50,.35) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
.hglow{position:absolute;top:-60px;right:80px;width:420px;height:280px;background:radial-gradient(ellipse,rgba(249,115,22,.1) 0%,rgba(249,115,22,.03) 50%,transparent 75%);pointer-events:none}
.hero-text h1{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;line-height:1;letter-spacing:2px;text-transform:uppercase;position:relative}
.hero-text h1 span{color:var(--orange)}
.hero-text p{color:var(--text2);font-size:14px;margin-top:7px;max-width:480px;position:relative}
.hstats{display:flex;gap:28px;position:relative}
.hs-num{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;color:var(--orange);line-height:1}
.hs-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.sort-sel{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);padding:8px 12px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s}
.sort-sel:focus{border-color:var(--orange)}
.rcount{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);margin-left:auto}
.sg{margin-bottom:26px}
.sg-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;user-select:none}
.sg-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.sg-badge{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 8px;text-transform:uppercase;border:1px solid}
.sg-badge.cur{color:var(--orange);border-color:var(--orange);background:var(--odim)}
.sg-badge.old{color:var(--text3);border-color:var(--border2)}
.sg-line{flex:1;height:1px;background:var(--border)}
.sg-cnt{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3)}
.sg-tog{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);border:1px solid var(--border);padding:3px 8px;background:transparent;cursor:pointer;transition:all .15s}
.sg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.sg-grid.collapsed{display:none}
.bc{background:var(--panel);border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.bc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .2s}
.bc:hover{border-color:rgba(255,255,255,.12);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.55)}
.bc:active{transform:scale(.98);box-shadow:none;transition:transform .1s}
.bc:hover::before{background:var(--orange)}
.bc-head{padding:13px 15px 11px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.bc-spec{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 7px;border:1px solid;margin-bottom:7px;width:fit-content}
.bc-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px;color:var(--text);line-height:1.1}
.bc-author{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);margin-top:3px}
.bc-author span{color:var(--blue)}
.creator-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 6px;border:1px solid var(--blue);color:var(--blue);background:var(--bdim);text-transform:uppercase;margin-left:5px;border-radius:2px}
.bc-rating{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.rnum{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--orange);line-height:1;letter-spacing:-0.5px}
.stars{display:flex;gap:2px}
.star{width:9px;height:9px;background:var(--orange);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.star.e{background:var(--border2)}
.bc-body{padding:12px 15px}
.gear-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.gs{background:var(--bg3);border:1px solid var(--border);padding:9px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;transition:border-color .15s}
.gs-icon{font-size:15px;line-height:1}
.gs-slot{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.gs-name{font-size:10px;font-weight:700;color:var(--text2);line-height:1.2}
.gs-name.exotic{color:var(--gold)}
.gs-name.named{color:var(--blue)}
.cs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:11px}
.cp{background:var(--bg3);border:1px solid var(--border);padding:7px 8px;text-align:center;border-radius:2px}
.cp-v{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;line-height:1}
.cp-l{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}
.ctags{display:flex;flex-wrap:wrap;gap:4px}
.ctag{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.8px;padding:3px 7px;border:1px solid var(--border);color:var(--text3);text-transform:uppercase;border-radius:2px}
.diff-tag{border-color:rgba(251,191,36,.3);color:var(--yellow);background:rgba(251,191,36,.06)}
.bc-foot{padding:10px 15px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.15)}
.bc-meta{display:flex;gap:12px}
.mitem{display:flex;align-items:center;gap:4px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)}
.bc-acts{display:flex;gap:5px}
.abt{background:transparent;border:1px solid var(--border);color:var(--text3);padding:5px 9px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.abt:hover{border-color:var(--orange);color:var(--orange);background:var(--odim)}
.abt.saved{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.08)}
.pbadge{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 5px;background:var(--gdim);border:1px solid rgba(74,222,128,.2);color:var(--green);text-transform:uppercase;margin-left:5px}
.obadge{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 5px;background:transparent;border:1px solid var(--border2);color:var(--text3);text-transform:uppercase;margin-left:5px}
.empty{text-align:center;padding:64px 20px;border:1px dashed var(--border2);background:var(--bg2)}
.empty h3{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:14px}
.empty p{color:var(--text3);font-size:12px;margin-top:6px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(5px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);width:100%;max-width:960px;margin:auto;position:relative;transform:translateY(22px);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-x:hidden}
.overlay.open .modal{transform:translateY(0)}

/* Mobile back bar */
.mob-back-bar{display:none}
.mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(135deg,var(--panel),var(--bg2));position:relative;overflow:hidden}
.mh-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(26,34,50,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(26,34,50,.3) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.mh-left{position:relative;z-index:1}
.mspec{display:inline-flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:4px 9px;border:1px solid;margin-bottom:8px}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1}
.msub{color:var(--text2);font-size:13px;margin-top:5px}
.mclose{background:transparent;border:1px solid var(--border);color:var(--text3);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;position:relative;z-index:1}
.mclose:hover{border-color:var(--red);color:var(--red)}
.mbody{padding:22px;display:grid;grid-template-columns:1fr 300px;gap:22px}
.sec{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--orange);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;margin-top:4px;display:flex;align-items:center;gap:7px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.gd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:20px}
.gd{background:var(--bg3);border:1px solid var(--border);padding:11px}
.gd-slot{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.gd-name{font-weight:700;font-size:13px;line-height:1.2;margin-bottom:2px}
.gd-name.exotic{color:var(--gold)}
.gd-name.named{color:var(--blue)}
.gd-brand{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:6px}
.gd-talent{font-size:11px;color:var(--orange2);font-weight:600;margin-bottom:5px}
.gd-mod{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)}
.gd-mod::before{content:'▸ '}
.wdrop-box{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--orange);padding:14px;margin-bottom:20px}
.wdrop-title{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.wdrop-w{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.wdrop-w:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.wdrop-wname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px}
.drop-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;font-size:12px;color:var(--text2);line-height:1.4}
.drop-badge{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 5px;border:1px solid;flex-shrink:0;text-transform:uppercase}
.drop-badge.targeted{color:var(--green);border-color:rgba(74,222,128,.3);background:var(--gdim)}
.drop-badge.campaign{color:var(--yellow);border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.07)}
.drop-badge.world{color:var(--text3);border-color:var(--border2)}
.skill-pair{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:20px}
.skill-card{background:var(--bg3);border:1px solid var(--border);padding:12px;display:flex;align-items:center;gap:10px}
.skill-icon{font-size:28px;line-height:1}
.skill-name{font-weight:700;font-size:14px}
.skill-var{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)}
.talent-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:20px}
.talent-card{background:var(--bg3);border:1px solid var(--border);border-left:2px solid var(--orange2);padding:11px 13px;transition:border-color .15s}
.talent-name{font-weight:700;font-size:13px;margin-bottom:3px;color:var(--orange2)}
.talent-desc{font-size:11px;color:var(--text2);line-height:1.5}
.tips-box{background:var(--bg3);border:1px solid var(--border);padding:14px 16px;font-size:12.5px;color:var(--text2);line-height:1.75;margin-bottom:20px}
.sbars{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.sbar{display:grid;grid-template-columns:110px 1fr 50px;align-items:center;gap:9px}
.sbar-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase}
.sbar-track{height:6px;background:var(--bg2);border:1px solid var(--border);position:relative;overflow:hidden;border-radius:3px}
.sbar-fill{height:100%;position:absolute;left:0;top:0;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.sbar-val{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-align:right}
.author-card{background:var(--bg3);border:1px solid var(--border);padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.author-av{width:44px;height:44px;background:var(--odim);border:1px solid var(--orange);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--orange);flex-shrink:0}
.author-name{font-weight:700;font-size:14px}

</div>

function showNotif(msg){var el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2600);}
function openOverlay(id){
  document.getElementById(id).classList.add('open');
  if(window.innerWidth>760){
    document.body.style.overflow='hidden';
  }
  // Animate stat bars
  requestAnimationFrame(function(){
    setTimeout(function(){
      document.querySelectorAll('.sbar-fill[data-target]').forEach(function(el){
        el.style.width=el.getAttribute('data-target')+'%';
      });
    },80);
  });
}
function closeOverlay(id){
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){var o=document.querySelector('.overlay.open');if(o)closeOverlay(o.id);}
});
// Swipe down to close modal on mobile

  var startY=0,modal=null,isDragging=false,startScroll=0;

    var ov=document.querySelector('.overlay.open');

    var touch=e.touches[0];

    if(touch.clientY-rect.top>120)return;
    startY=touch.clientY;
    startScroll=modal.scrollTop||0;
    isDragging=true;
    modal.style.transition='none';
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!isDragging||!modal)return;
    var dy=e.touches[0].clientY-startY;
    if(dy<0)return;
    modal.style.transform='translateY('+dy+'px)';
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!isDragging||!modal)return;
    var dy=e.changedTouches[0].clientY-startY;
    modal.style.transition='';
    if(dy>90){
      modal.style.transform='translateY(100%)';
      setTimeout(function(){
        modal.style.transform='';
        var ov=document.querySelector('.overlay.open');
        if(ov)closeOverlay(ov.id);
      },220);
    } else {
      modal.style.transform='';
    }
    isDragging=false;modal=null;
  },{passive:true});
})();

function toggleTag(el,t){
  el.classList.toggle('active');

}
function applyFilters(){if(currentTab==='builds')renderMain();}
function getFiltered(){
  var q=document.getElementById('searchInput').value.toLowerCase().trim();
  return BUILDS.filter(function(b){
    if(currentSpec!=='all'&&b.spec!==currentSpec) return false;
    if(q&&!b.name.toLowerCase().includes(q)&&!b.author.toLowerCase().includes(q)&&!b.gear.some(function(g){return g.brand.toLowerCase().includes(q)||g.name.toLowerCase().includes(q);})) return false;
    if(activeTags.length&&!activeTags.every(function(t){return b.tags.includes(t)||b.difficulty===t;})) return false;
    return true;
  });
}
function sortBuilds(val,arr){
  var a=[...arr];
  if(val==='top') a.sort(function(x,y){return y.rating-x.rating;});
  else if(val==='new') a.sort(function(x,y){return y.id-x.id;});
  else if(val==='views') a.sort(function(x,y){return y.views-x.views;});
  else if(val==='name') a.sort(function(x,y){return x.name.localeCompare(y.name);});
  return a;
}

    +'<div class="sec">Weapon Drop Locations</div><div class="wdrop-box"><div class="wdrop-title">&#x1F50E; Verified Drop Sources</div>'+dropW(b.weapons.primary)+(b.weapons.secondary?dropW(b.weapons.secondary):'')+'</div>'
    +'<div class="sec">Skills</div><div class="skill-pair">'+b.skills.map(function(s){
    var desc={
      "Striker Drone":"Tracks your target and deals continuous weapon damage automatically.",
      "Assault Turret":"Deploys and fires at all enemies in range autonomously.",
      "Reviver Hive":"Auto-revives you or downed allies within its radius.",
      "Chem Launcher":"Fires a canister that explodes with a chemical on impact. Variant changes effect.",
      "Oxidizer":"Corrodes enemy armor — reduces enemy armor over time in AoE.",
      "Blinder Firefly":"Seeks out and blinds enemies, preventing them from shooting.",
      "Seeker Mine":"Rolls toward enemies and detonates — Airburst clusters multiple blasts.",
      "Restorer Hive":"Heals allies within range continuously.",
      "Heal":"Emergency area heal — applies armor repair to you and allies.",
      "Airburst":"Launches multiple submunitions at nearby enemies.",
      "Drone":"Auto-attacks your target continuously from the air.",
      "Hive":"Deploys on the ground to affect allies within range.",
      "Turret":"Stationary auto-attack unit.",
      "Firefly":"Smart projectile that seeks out and applies effects to enemies."
    }[s.variant]||[s.name]||"";
    return '<div class="skill-card"><div class="skill-icon">'+s.icon+'</div><div><div class="skill-name">'+s.name+'</div><div class="skill-var">'+s.variant+'</div>'+( desc ? '<div style="font-size:10.5px;color:var(--text3);margin-top:3px;line-height:1.4">'+desc+'</div>' : '')+'</div></div>';
  }).join('')+'</div>'
    +'<div class="sec">Key Talents</div><div class="talent-grid">'+b.talents.map(function(t){return '<div class="talent-card"><div class="talent-name">'+t.name+'</div><div class="talent-desc">'+t.desc+'</div></div>';}).join('')+'</div>'
    +'<div class="sec">Tips</div><div class="tips-box"><ul style="list-style:none;display:flex;flex-direction:column;gap:5px">'+b.tips.map(function(t){return '<li style="color:var(--text2)">&#x25B8; '+t+'</li>';}).join('')+'</ul></div>'
    +'</div>'
    +'<div><div class="sec">Stats</div><div class="sbars">'
    +[{lbl:'Weapon DMG',v:b.stats.weaponDmg,max:100,col:col,d:b.stats.weaponDmg+'%'},{lbl:'Armor',v:b.stats.armor,max:100,col:'#60a5fa',d:b.stats.armor+'%'},{lbl:'Crit Chance',v:b.stats.critChance,max:60,col:'#fbbf24',d:b.stats.critChance+'%'},{lbl:'Crit Damage',v:b.stats.critDmg,max:150,col:'#f87171',d:b.stats.critDmg+'%'},{lbl:'Armor Regen',v:b.stats.armorRegen,max:60,col:'#4ade80',d:b.stats.armorRegen+'%'},{lbl:'Skill Tier',v:b.stats.skillTier,max:6,col:'#a78bfa',d:b.stats.skillTier+' / 6'}].map(function(s){
    var pct=Math.min(100,(s.v/s.max)*100);
    var atCap=s.lbl==='Crit Chance'&&s.v>=60;
    var capBadge=atCap?'<span style="font-family:\'Share Tech Mono\',monospace;font-size:7px;padding:1px 4px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:var(--green);margin-left:5px">CAP</span>':'';
    return '<div class="sbar"><div class="sbar-lbl" style="display:flex;align-items:center">'+s.lbl+capBadge+'</div><div class="sbar-track"><div class="sbar-fill" style="width:0%;background:'+s.col+'" data-target="'+pct+'"></div></div><div class="sbar-val" style="color:'+s.col+'">'+s.d+'<span style="font-family:\'Share Tech Mono\',monospace;font-size:8px;color:var(--text3);margin-left:3px">/ '+s.max+(s.lbl==='Skill Tier'?'':s.lbl==='Skill Tier'?'':'%')+'</span></div></div>';
  }).join('')
    +'</div><div class="sec">Tags</div><div class="tags" style="margin-bottom:18px">'+b.tags.map(function(t){return '<span class="tag active" style="pointer-events:none">'+t+'</span>';}).join('')+'</div>'
    +'<div class="sec">Creator</div><div class="author-card"><div class="author-av">'+b.author[0]+'</div><div><div class="author-name">'+b.author+(b.creatorVerified?' <span class="creator-badge">&#x2713;</span>':'')+'</div><div class="author-sub">Division 2 Content Creator</div></div></div>'
    +'<div class="sec">Build Info</div><div class="meta-rows">'
    +'<div class="mrow"><span class="lbl">Season</span><span class="val">'+(b.season==='current'?'Current Meta':'Still Viable')+'</span></div>'
    +'<div class="mrow"><span class="lbl">Patch</span><span class="val">'+b.patch+'</span></div>'
    +'<div class="mrow"><span class="lbl">Difficulty</span><span class="val">'+b.difficulty+'</span></div>'
    +'<div class="mrow"><span class="lbl">Views</span><span class="val">'+b.views.toLocaleString()+'</span></div>'
    +'<div class="mrow"><span class="lbl">Saves</span><span class="val">'+b.saves+'</span></div>'
    +'</div></div></div>'
    +'<div class="mfoot"><button class="btn btn-ghost" onclick="closeOverlay(\'detailOverlay\')">Close</button><button class="btn btn-ghost" onclick="showNotif(\'Link copied!\')">&#x1F4CB; Copy Link</button><button class="btn '+(isSaved?'btn-save':'btn-primary')+'" id="mSaveBtn" onclick="toggleSaveModal('+b.id+')">'+(isSaved?'&#x2713; Saved':'Save Build')+'</button></div>';
  openOverlay('detailOverlay');
}

// Hide FAB while scrolling, show after pause
(function(){
  var fabTimer;
  window.addEventListener('scroll', function(){
    var fab = document.querySelector('.mob-fab');
    if(!fab) return;
    fab.style.opacity='0';
    fab.style.pointerEvents='none';
    clearTimeout(fabTimer);
    fabTimer = setTimeout(function(){
      fab.style.opacity='1';
      fab.style.pointerEvents='';
    }, 800);
  }, {passive:true});
})();

function switchModalTab(idx,btn){
  document.querySelectorAll('.modal-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.modal-tab-content').forEach(function(c){c.classList.remove('active');});
  btn.classList.add('active');
  var content=document.getElementById('mtab-'+idx);
  if(content){
    content.classList.add('active');
    // Scroll modal to top when switching tabs
    var modal=document.getElementById('detailModal');
    if(modal)modal.scrollTop=0;
    // Re-trigger stat bar animation on Stats tab
    if(idx===3){
      requestAnimationFrame(function(){
        setTimeout(function(){
          content.querySelectorAll('.sbar-fill[data-target]').forEach(function(el){
            el.style.width=el.getAttribute('data-target')+'%';
          });
        },80);
      });
    }
  }
}
function toggleSave(id,btn){
  if(savedBuilds.has(id)){savedBuilds.delete(id);btn.textContent='Save';btn.classList.remove('saved');showNotif('Removed.');}
  else{savedBuilds.add(id);btn.innerHTML='&#x2713; Saved';btn.classList.add('saved');showNotif('Build saved!');}
  if(currentTab==='saved') renderMain();
}
function toggleSaveModal(id){
  var btn=document.getElementById('mSaveBtn');
  if(savedBuilds.has(id)){savedBuilds.delete(id);btn.textContent='Save Build';btn.className='btn btn-primary';showNotif('Removed.');}
  else{savedBuilds.add(id);btn.innerHTML='&#x2713; Saved';btn.className='btn btn-save';showNotif('Saved!');}
  renderMain();
}
function openCreate(){openOverlay('createOverlay');}
function pickSpec(el,s){
  newSpecSel=s;
  document.querySelectorAll('.spec-opt').forEach(function(b){b.classList.remove('sel');});
  el.classList.add('sel');
}
function submitBuild(){
  var name=document.getElementById('nb-name').value.trim();
  if(!name){showNotif('Enter a build name!');return;}
  if(!newSpecSel){showNotif('Select a specialization!');return;}
  showNotif('"'+name+'" published!');
  closeOverlay('createOverlay');
  document.getElementById('nb-name').value='';
  newSpecSel='';
  document.querySelectorAll('.spec-opt').forEach(function(b){b.classList.remove('sel');});
}

renderEvWidget();
renderMain();

// Mobile helpers
function openFilterDrawer(){
  document.getElementById('filterDrawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeFilterDrawer(){
  document.getElementById('filterDrawer').classList.remove('open');
  document.body.style.overflow='';
}
function syncSearch(val){
  var desk=document.getElementById('searchInput');
  if(desk) desk.value=val;
  applyFilters();
}

// Override setTab to also update mobile nav
var origSetTab=setTab;
setTab=function(t){
  origSetTab(t);
  ['builds','saved','events','creators'].forEach(function(x){
    var el=document.getElementById('mob-'+x);
    if(el) el.classList.toggle('active',x===t);
  });
  // Hide filter button on non-builds tabs
  var fab=document.getElementById('mobFilterBtn');
  if(fab) fab.style.display=(t==='builds')?'':'none';
};
</script>
